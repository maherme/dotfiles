"$schema" = 'https://starship.rs/config-schema.json'

format = "$hostname $directory$git_branch$git_status$status\n$character"

add_newline = false

palette = 'catppuccin_mocha'

[character]
success_symbol = '[>](bold blue)'
error_symbol = '[>](bold red)'

[directory]
truncation_length = 10
truncation_symbol = ".../"
truncate_to_repo = false
home_symbol = "~"
read_only = " (read only) "

[git_branch]
symbol = " "

[git_commit]
tag_symbol = '  '

[hostname]
ssh_symbol = " "

[status]
symbol = 'error:'
format = '[$symbol$status$signal_name$maybe_int](bold red)'
map_symbol = true
disabled = false

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
